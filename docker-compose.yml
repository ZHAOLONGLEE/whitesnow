services:
  nginx:
    image: nginx:alpine
    ports:
      - "8081:80"
    volumes:
      - ./nginx/nginx-dev.conf:/etc/nginx/nginx.conf:ro
      - ./frontend:/var/www/html:ro
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: always

  backend:
    build: ./backend
    environment:
      - APP_ENV=${APP_ENV:-development}
      - APP_SECRET=${APP_SECRET:-change-me}
      - MEDIA_ROOT=/media
      - MEDIA_EXCLUDE_FOLDERS=${MEDIA_EXCLUDE_FOLDERS:-}
      - DATABASE_URL=sqlite:///./data/mediascan.db
      - HOST=0.0.0.0
      - PORT=8000
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-changeme}
    volumes:
      - ./backend:/app
      - ./frontend:/frontend
      - ./data:/app/data
      - ./static:/app/static
      - ${MEDIA_ROOT:-/media}:/media:ro
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: always
